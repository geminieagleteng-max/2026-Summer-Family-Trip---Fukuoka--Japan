<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景點詳細介紹 - 極光旅行社 Fukuoka 2026</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🎨 Dedicated Styles for Spot Detail Page */
    .spot-page {
      padding-top: 40px;
      padding-bottom: 80px;
    }
    
    .back-btn-wrapper {
      margin-bottom: 24px;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition-fast);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
    }
    
    .back-btn:hover {
      color: #fff;
      border-color: var(--primary);
      transform: translateX(-4px);
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .spot-hero {
      position: relative;
      height: 400px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 48px;
      display: flex;
      align-items: flex-end;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .spot-hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
      filter: brightness(0.7);
      transition: var(--transition-smooth);
    }

    .spot-hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(to top, rgba(10, 15, 30, 0.95) 0%, rgba(10, 15, 30, 0) 100%);
      z-index: 2;
    }

    .spot-hero-content {
      position: relative;
      z-index: 3;
      padding: 48px;
      width: 100%;
    }

    .spot-cat-badge {
      background: var(--primary-glow);
      color: var(--primary);
      border: 1px solid rgba(var(--primary-hsl), 0.3);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .spot-title-main {
      font-size: 3rem;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.15;
    }

    .spot-subtitle-main {
      font-size: 1.15rem;
      color: var(--text-muted);
    }

    .spot-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      align-items: start;
    }

    .spot-main {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .spot-article-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: var(--transition-smooth);
    }

    .spot-article-card:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .spot-article-card h2 {
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .spot-article-card h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: var(--secondary);
      border-radius: 2px;
    }

    .spot-article-card p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .spot-article-card p:last-child {
      margin-bottom: 0;
    }

    .spot-article-card ul {
      list-style-type: disc;
      padding-left: 24px;
      margin-bottom: 16px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 1.02rem;
    }

    .spot-article-card li strong {
      color: #fff;
    }

    /* Sidebar Quick Info Card */
    .spot-sidebar {
      display: flex;
      flex-direction: column;
      gap: 30px;
      position: sticky;
      top: 100px;
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .info-card h3 {
      font-size: 1.25rem;
      color: #fff;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info-card h3 i {
      color: var(--primary);
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .info-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .info-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 50px;
      background: var(--primary-glow);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.95rem;
    }

    .info-item-text h4 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .info-item-text p {
      font-size: 0.95rem;
      color: #fff;
      line-height: 1.5;
    }

    /* Fallback / Error view */
    .error-container {
      text-align: center;
      padding: 100px 24px;
    }

    .error-container i {
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .error-container h2 {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    @media (max-width: 1024px) {
      .spot-layout {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .spot-sidebar {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .spot-hero {
        height: 300px;
        margin-bottom: 30px;
      }
      .spot-hero-content {
        padding: 24px;
      }
      .spot-title-main {
        font-size: 2.2rem;
      }
      .spot-article-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar scrolled">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <i class="fa-solid fa-compass logo-icon"></i>
        <span>極光旅行社 <span class="sub-brand">Fukuoka 2026</span></span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> 首頁</a></li>
        <li><a href="index.html#itinerary" class="nav-link"><i class="fa-solid fa-calendar-days"></i> 每日行程</a></li>
        <li><a href="index.html#attractions" class="nav-link active"><i class="fa-solid fa-map-location-dot"></i> 景點特色</a></li>
        <li><a href="index.html#hotels" class="nav-link"><i class="fa-solid fa-hotel"></i> 飯店行李</a></li>
        <li><a href="index.html#passes" class="nav-link"><i class="fa-solid fa-ticket"></i> 交通票券</a></li>
      </ul>
      <div class="nav-cta">
        <a href="index.html" class="btn btn-sm">返回首頁</a>
      </div>
    </div>
  </nav>

  <main class="container spot-page">
    <!-- Back Button -->
    <div class="back-btn-wrapper">
      <a href="index.html#attractions" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> 返回景點列表
      </a>
    </div>

    <!-- Dynamic Container -->
    <div id="spot-content-target">
      <!-- Loading Skeleton or placeholder -->
      <div class="error-container" id="loading-state">
        <i class="fa-solid fa-spinner fa-spin" style="color: var(--secondary)"></i>
        <h2>載入中...</h2>
        <p>正在為您開啟豐富的景點故事</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 2026暑假家庭旅遊_日本福岡. All rights reserved. Designed for GitHub Pages.</p>
      </div>
    </div>
  </footer>

  <!-- Script to dynamically load data -->
  <script type="module">
    import { spotDetails } from './spot-details.js';

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const spotId = urlParams.get('id');
      const target = document.getElementById('spot-content-target');

      if (!spotId || !spotDetails[spotId]) {
        // Show Error Fallback
        target.innerHTML = `
          <div class="error-container">
            <i class="fa-solid fa-circle-exclamation"></i>
            <h2>找不到此景點資料</h2>
            <p>抱歉，我們無法找到該景點的詳細資訊。請確認網址是否正確，或返回首頁重新選擇。</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 24px;">返回首頁</a>
          </div>
        `;
        return;
      }

      const data = spotDetails[spotId];

      // Update Document Title
      document.title = `${data.title} - 極緻景點導覽`;

      // Render Page Structure
      let sectionsHTML = '';
      data.sections.forEach(sec => {
        let pHTML = '';
        sec.paragraphs.forEach(p => {
          // Parse markdown-style **bold** tags dynamically
          let formattedP = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          
          if (p.startsWith('**') && p.includes('**：')) {
            // Render bullet style list if paragraphs start with list keys
            const parts = formattedP.split('：');
            pHTML += `<li>${parts[0]}：${parts.slice(1).join('：')}</li>`;
          } else {
            pHTML += `<p>${formattedP}</p>`;
          }
        });

        // Wrap list items in <ul> if needed
        if (pHTML.includes('<li>')) {
          // Convert contiguous <li> elements to <ul> block
          pHTML = pHTML.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
        }

        sectionsHTML += `
          <article class="spot-article-card">
            <h2>${sec.heading}</h2>
            ${pHTML}
          </article>
        `;
      });

      const mainHTML = `
        <!-- Spot Hero -->
        <header class="spot-hero">
          <div class="spot-hero-bg" style="background-image: url('${data.heroImage}');"></div>
          <div class="spot-hero-content">
            <span class="spot-cat-badge">${data.category}</span>
            <h1 class="spot-title-main">${data.title}</h1>
            <p class="spot-subtitle-main">${data.badge}</p>
          </div>
        </header>

        <!-- Layout Grid -->
        <div class="spot-layout">
          <!-- Main Content Left Column -->
          <div class="spot-main">
            ${sectionsHTML}
          </div>

          <!-- Sidebar Right Column -->
          <aside class="spot-sidebar">
            <div class="info-card">
              <h3><i class="fa-solid fa-circle-info"></i> 景點資訊速覽</h3>
              <div class="info-list">
                <div class="info-item">
                  <div class="info-item-icon"><i class="fa-solid fa-clock"></i></div>
                  <div class="info-item-text">
                    <h4>開放時間</h4>
                    <p>${data.quickInfo.hours}</p>
                  </div>
                </div>
                <div class="info-item">
                  <div class="info-item-icon"><i class="fa-solid fa-ticket"></i></div>
                  <div class="info-item-text">
                    <h4>參觀費用</h4>
                    <p>${data.quickInfo.fee}</p>
                  </div>
                </div>
                <div class="info-item">
                  <div class="info-item-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                  <div class="info-item-text">
                    <h4>停留時間</h4>
                    <p>${data.quickInfo.time}</p>
                  </div>
                </div>
                <div class="info-item">
                  <div class="info-item-icon"><i class="fa-solid fa-train"></i></div>
                  <div class="info-item-text">
                    <h4>交通指引</h4>
                    <p>${data.quickInfo.traffic}</p>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Trip Safety Info Widget -->
            <div class="info-card" style="background: linear-gradient(135deg, rgba(var(--primary-hsl), 0.08) 0%, rgba(var(--secondary-hsl), 0.08) 100%); border-color: var(--border-focus);">
              <h3 style="border-bottom-color: rgba(255,255,255,0.08);"><i class="fa-solid fa-circle-question" style="color: var(--secondary);"></i> 需要協助嗎？</h3>
              <p style="font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px;">
                此景點是您 2026 福岡家庭旅遊的主打行程。如果您在出發前對門票預約、交通轉乘有任何疑問，可隨時聯絡導遊。
              </p>
              <a href="index.html#itinerary" class="btn btn-outline btn-sm" style="width: 100%; justify-content: center;">查看今日行程安排</a>
            </div>
          </aside>
        </div>
      `;

      target.innerHTML = mainHTML;
    });
  </script>
</body>
</html>
